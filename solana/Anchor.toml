[toolchain]
anchor_version = "0.31.1"
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.devnet]
koji_receiver = "8SAWJGqo8Ku89SC2iVwua2Zcu2CWF56btDnTFEWNRNdY"

[programs.localnet]
koji_receiver = "8SAWJGqo8Ku89SC2iVwua2Zcu2CWF56btDnTFEWNRNdY"

[provider]
# Default to localnet so `anchor test` / local workflows never spend devnet rent.
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# Metaplex Core at canonical program id (same on mainnet/devnet). Vendored ELF
# under `testfixtures/`; refresh with `bash scripts/fetch-mpl-core.sh` (mainnet RPC read).
[test]
startup_wait = 15000

[[test.genesis]]
address = "CoREENxT6tW1HoK8ypY1SxRMZTcVPm7R94rH4PZNhX7d"
program = "testfixtures/mpl_core.so"

[test.validator]
bind_address = "127.0.0.1"

[hooks]
